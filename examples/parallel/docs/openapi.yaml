openapi: 3.0.3
info:
  title: Blog API (parallel)
  version: 1.0.0
paths:
  /api/posts:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    body:
                      type: string
                    id:
                      type: string
                    title:
                      type: string
                    user_id:
                      type: string
                  type: object
                type: array
          description: OK
      summary: List posts
      tags:
      - posts
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                body:
                  type: string
                title:
                  type: string
                user_id:
                  type: string
              type: object
      responses:
        "201":
          content:
            application/json:
              schema:
                properties:
                  body:
                    type: string
                  id:
                    type: string
                  title:
                    type: string
                  user_id:
                    type: string
                type: object
          description: Created
      summary: Create a post
      tags:
      - posts
  /api/posts/{id}:
    get:
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  body:
                    type: string
                  id:
                    type: string
                  title:
                    type: string
                  user_id:
                    type: string
                type: object
          description: OK
        "404":
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
          description: Not Found
      summary: Get post by ID
      tags:
      - posts
  /api/users:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    email:
                      type: string
                    id:
                      type: string
                    name:
                      type: string
                  type: object
                type: array
          description: OK
      summary: List users
      tags:
      - users
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                name:
                  type: string
              type: object
      responses:
        "201":
          content:
            application/json:
              schema:
                properties:
                  email:
                    type: string
                  id:
                    type: string
                  name:
                    type: string
                type: object
          description: Created
      summary: Create a user
      tags:
      - users
  /api/users/{id}:
    get:
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  email:
                    type: string
                  id:
                    type: string
                  name:
                    type: string
                type: object
          description: OK
        "404":
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                type: object
          description: Not Found
      summary: Get user by ID
      tags:
      - users

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23", "1.24", "1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Verify dependencies
        run: go mod verify

      - name: Build library
        run: go build ./...

      - name: Run core tests
        run: go test ./... -v

      - name: Run Gin example tests
        working-directory: examples/gin
        run: |
          go mod download
          go test ./... -v

      - name: Run Echo example tests
        working-directory: examples/echo
        run: |
          go mod download
          go test ./... -v
      
      - name: Run Chi example tests
        working-directory: examples/chi
        run: |
          go mod download
          go test ./... -v
      
      - name: Run Fiber example tests
        working-directory: examples/fiber
        run: |
          go mod download
          go test ./... -v

      - name: Run Todo example tests
        working-directory: examples/todo
        run: |
          go mod download
          go test ./... -v

  vet-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout 5m

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Verify dependencies
        run: go mod verify

      - name: Build library
        run: go build ./...

      - name: Run core tests (stdlib example)
        run: go test ./... -v

      - name: Run Gin example tests
        working-directory: examples/gin
        run: |
          go mod download
          go test ./... -v

      - name: Run Echo example tests
        working-directory: examples/echo
        run: |
          go mod download
          go test ./... -v
      
      - name: Run Chi example tests
        working-directory: examples/chi
        run: |
          go mod download
          go test ./... -v
      
      - name: Run Fiber example tests
        working-directory: examples/fiber
        run: |
          go mod download
          go test ./... -v

      - name: Build CLI
        run: go build -o gswag ./cmd/gswag

      - name: Validate generated stdlib spec
        run: ./gswag validate ./examples/stdlib/docs/openapi.yaml

      - name: Validate generated Gin spec
        run: ./gswag validate ./examples/gin/docs/openapi.yaml

      - name: Validate generated Echo spec
        run: ./gswag validate ./examples/echo/docs/openapi.yaml

      - name: Validate generated Chi spec
        run: ./gswag validate ./examples/chi/docs/openapi.yaml

      - name: Validate generated Fiber spec
        run: ./gswag validate ./examples/fiber/docs/openapi.yaml

  golden-file-diff:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Generate specs on PR branch
        run: |
          go test ./...
          cd examples/gin && go mod download && go test ./...
          cd ../echo && go mod download && go test ./...
          cd ../chi && go mod download && go test ./...
          cd ../fiber && go mod download && go test ./...


      - name: Diff specs against base branch
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} -- \
            examples/stdlib/docs/openapi.yaml \
            examples/gin/docs/openapi.yaml \
            examples/echo/docs/openapi.yaml \
            > spec.diff || true
          if [ -s spec.diff ]; then
            echo "### OpenAPI spec changed" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            cat spec.diff >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No spec changes detected." >> $GITHUB_STEP_SUMMARY
          fi

  vet-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false
